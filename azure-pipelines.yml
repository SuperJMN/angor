trigger:
  branches:
    include:
      - main

variables:
  - group: api-keys

stages:
  - stage: ubuntu_latest
    displayName: 'ubuntu-latest'
    pool:
      vmImage: 'ubuntu-latest'

    jobs:
      - job: Publish
        displayName: 'Publish'
        steps:

          # 1) Instala el SDK de .NET 9 antes de cualquier otra cosa
          - task: UseDotNet@2
            displayName: 'Instalar .NET 9 SDK'
            inputs:
              packageType: 'sdk'
              version: '9.0.x'
              includePreview: true

          # 2) Checkout del código con todo el historial
          - checkout: self
            fetchDepth: 0

          # 3) Caché de Nuke y de paquetes NuGet
          - task: Cache@2
            displayName: 'Cache: nuke-temp'
            inputs:
              key: $(Agent.OS) | nuke-temp | **/global.json, **/*.csproj, **/Directory.Packages.props
              restoreKeys: $(Agent.OS) | nuke-temp
              path: .nuke/temp

          - task: Cache@2
            displayName: 'Cache: nuget-packages'
            inputs:
              key: $(Agent.OS) | nuget-packages | **/global.json, **/*.csproj, **/Directory.Packages.props
              restoreKeys: $(Agent.OS) | nuget-packages
              path: $(HOME)/.nuget/packages

          # 4) Ejecuta tu build de Nuke
          - task: CmdLine@2
            displayName: 'Run: Publish'
            inputs:
              script: './build.cmd Publish --skip'
            env:
              GitHubApiKey: $(GitHubApiKey)
              AndroidBase64Keystore: $(AndroidBase64Keystore)
              AndroidSigningKeyAlias: $(AndroidSigningKeyAlias)
              AndroidSigningStorePass: $(AndroidSigningStorePass)
              AndroidSigningKeyPass: $(AndroidSigningKeyPass)
